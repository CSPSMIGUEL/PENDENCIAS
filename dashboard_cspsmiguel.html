<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSP SAO MIGUEL - Pendencias Ativas</title>
<style>
:root{
  --bg:#0b0f14; --bg2:#121821; --card:#161d27; --card2:#1c2430;
  --border:#26303d; --text:#e8edf3; --text2:#93a1b3; --accent:#3b9eff;
  --ok:#2fbf71; --warn:#f2b94b; --bad:#ef5a5a; --muted:#5b6b80;
}
[data-theme="light"]{
  --bg:#f4f6f9; --bg2:#ffffff; --card:#ffffff; --card2:#eef1f5;
  --border:#dde3ea; --text:#1a2330; --text2:#5c6b7d; --accent:#1c72d8;
  --ok:#1f9d5c; --warn:#c98a1a; --bad:#d33d3d; --muted:#8a97a8;
}
*{box-sizing:border-box;}
body{margin:0;font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);transition:background .2s,color .2s;}
header{display:flex;align-items:center;justify-content:space-between;padding:18px 28px;background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap;gap:12px;}
.brand{display:flex;align-items:center;gap:14px;}
.brand img{height:36px;filter:none;transition:filter .2s;}
[data-theme="dark"] .brand img{filter:invert(1) hue-rotate(180deg);}
.brand h1{font-size:20px;margin:0;letter-spacing:.5px;}
.brand .sub{font-size:12px;color:var(--text2);margin-top:2px;}
.controls{display:flex;align-items:center;gap:10px;}
button.theme-toggle{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;}
button.theme-toggle:hover{border-color:var(--accent);}
main{padding:22px 28px;max-width:1500px;margin:0 auto;}
.kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:22px;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:transform .12s,border-color .12s;}
.kpi:hover{transform:translateY(-2px);border-color:var(--accent);}
.kpi .val{font-size:28px;font-weight:700;}
.kpi .lbl{font-size:12px;color:var(--text2);margin-top:4px;}
.kpi.ok .val{color:var(--ok);} .kpi.bad .val{color:var(--bad);}
.kpi.warn .val{color:var(--warn);} .kpi.muted .val{color:var(--muted);}
.filters{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px;align-items:center;}
.filters select, .filters input{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:8px;font-size:13px;}
.filters input[type="text"]{flex:1;min-width:220px;}
.filters .clear{background:transparent;border:1px solid var(--border);color:var(--text2);padding:8px 12px;border-radius:8px;cursor:pointer;font-size:13px;}
.filters .clear:hover{color:var(--bad);border-color:var(--bad);}
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:auto;max-height:65vh;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{position:sticky;top:0;background:var(--card2);text-align:left;padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap;color:var(--text2);font-weight:600;}
th:hover{color:var(--accent);}
td{padding:9px 12px;border-bottom:1px solid var(--border);white-space:nowrap;}
tbody tr{cursor:pointer;}
tbody tr:hover{background:var(--card2);}
.badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
.badge.ok{background:rgba(47,191,113,.15);color:var(--ok);}
.badge.bad{background:rgba(239,90,90,.15);color:var(--bad);}
.badge.muted{background:rgba(91,107,128,.15);color:var(--muted);}
.count-info{color:var(--text2);font-size:12px;margin:10px 0;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);align-items:center;justify-content:center;z-index:50;}
.modal-bg.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:24px;max-width:640px;width:92%;max-height:85vh;overflow:auto;}
.modal h2{margin-top:0;font-size:18px;}
.modal .row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;gap:16px;}
.modal .row span:first-child{color:var(--text2);}
.modal .row span:last-child{text-align:right;}
.modal .close{float:right;background:var(--card2);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:8px;cursor:pointer;}
@media(max-width:1100px){.kpis{grid-template-columns:repeat(3,1fr);}}
@media(max-width:640px){.kpis{grid-template-columns:repeat(2,1fr);}}
</style>
</head>

function toggleTheme(){
  const html = document.documentElement;
  const cur = html.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage_fake = next;
}

let sortKey = null, sortDir = 1;
let activeKpi = 'all';

function popularSelect(id, campo){
  const vals = [...new Set(DATA.map(r => r[campo]).filter(Boolean))].sort();
  const sel = document.getElementById(id);
  vals.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v; opt.textContent = v;
    sel.appendChild(opt);
  });
}
popularSelect('f-categoria', 'categoria');
popularSelect('f-status', 'status');
popularSelect('f-motivo', 'motivo');
popularSelect('f-warranty', 'warranty');

function aplicarFiltroKpi(r){
  switch(activeKpi){
    case 'dentro': return r.slaStatus === 'Dentro do prazo';
    case 'fora': return r.slaStatus === 'Fora do prazo';
    case 'semsla': return r.slaStatus === '-';
    case 'tatmedio': return r.tat !== null && r.tat >= 25 && r.tat <= 40;
    case 'tatalto': return (r.tat || 0) > 40;
    default: return true;
  }
}

function filtrar(){
  const busca = document.getElementById('f-search').value.trim().toLowerCase();
  const categoria = document.getElementById('f-categoria').value;
  const status = document.getElementById('f-status').value;
  const motivo = document.getElementById('f-motivo').value;
  const warranty = document.getElementById('f-warranty').value;
  const sla = document.getElementById('f-sla').value;

  let rows = DATA.filter(r => aplicarFiltroKpi(r));
  if (categoria) rows = rows.filter(r => r.categoria === categoria);
  if (status) rows = rows.filter(r => r.status === status);
  if (motivo) rows = rows.filter(r => r.motivo === motivo);
  if (warranty) rows = rows.filter(r => r.warranty === warranty);
  if (sla) rows = rows.filter(r => r.slaStatus === sla);
  if (busca){
    rows = rows.filter(r => JSON.stringify(r).toLowerCase().includes(busca));
  }
  if (sortKey){
    rows.sort((a,b) => {
      let va = a[sortKey], vb = b[sortKey];
      if (va === null || va === undefined) va = '';
      if (vb === null || vb === undefined) vb = '';
      if (typeof va === 'number' && typeof vb === 'number') return (va-vb)*sortDir;
      return String(va).localeCompare(String(vb)) * sortDir;
    });
  }
  return rows;
}

function slaBadge(r){
  if (r.slaStatus === 'Dentro do prazo') return '<span class="badge ok">Dentro do prazo</span>';
  if (r.slaStatus === 'Fora do prazo') return '<span class="badge bad">Fora do prazo</span>';
  return '<span class="badge muted">Sem SLA</span>';
}

function render(){
  const rows = filtrar();
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = rows.map((r,i) => `
    <tr onclick="abrirModal(${DATA.indexOf(r)})">
      <td>${r.so}</td>
      <td>${r.modelo}</td>
      <td>${r.categoria}</td>
      <td>${r.status}</td>
      <td>${r.motivo}</td>
      <td>${r.warranty}</td>
      <td>${r.tat !== null ? r.tat : '-'}</td>
      <td>${slaBadge(r)}</td>
      <td>${r.dataSolicitacao}</td>
      <td>${r.tecnico}</td>
    </tr>`).join('');
  document.getElementById('count-info').textContent = rows.length + ' de ' + DATA.length + ' registros exibidos';
}

function abrirModal(idx){
  const r = DATA[idx];
  document.getElementById('m-so').textContent = 'SO ' + r.so + ' - ' + r.modelo;
  const campos = [
    ['ASC', r.asc], ['Produto', r.produto], ['Categoria', r.categoria],
    ['Status', r.status], ['Motivo', r.motivo], ['Garantia', r.warranty],
    ['Tipo de servico', r.tipoServico], ['TAT (dias)', r.tat !== null ? r.tat : '-'],
    ['Limite SLA (dias)', r.slaLimite !== null ? r.slaLimite : '-'],
    ['SLA', r.slaStatus], ['Data de solicitacao', r.dataSolicitacao],
    ['Tecnico', r.tecnico], ['Defeito', r.defeito],
    ['Reparo', r.reparo], ['Observacao', r.observacao],
  ];
  document.getElementById('m-body').innerHTML = campos.map(([k,v]) =>
    `<div class="row"><span>${k}</span><span>${v || '-'}</span></div>`).join('');
  document.getElementById('modal-bg').classList.add('open');
}
function fecharModal(){ document.getElementById('modal-bg').classList.remove('open'); }

document.querySelectorAll('th[data-k]').forEach(th => {
  th.addEventListener('click', () => {
    const k = th.dataset.k;
    if (sortKey === k) sortDir *= -1; else { sortKey = k; sortDir = 1; }
    render();
  });
});
document.querySelectorAll('.kpi').forEach(el => {
  el.addEventListener('click', () => {
    activeKpi = el.dataset.f;
    render();
  });
});
['f-search','f-categoria','f-status','f-motivo','f-warranty','f-sla'].forEach(id => {
  document.getElementById(id).addEventListener('input', render);
  document.getElementById(id).addEventListener('change', render);
});
function limparFiltros(){
  document.getElementById('f-search').value = '';
  document.getElementById('f-categoria').value = '';
  document.getElementById('f-status').value = '';
  document.getElementById('f-motivo').value = '';
  document.getElementById('f-warranty').value = '';
  document.getElementById('f-sla').value = '';
  activeKpi = 'all';
  render();
}
